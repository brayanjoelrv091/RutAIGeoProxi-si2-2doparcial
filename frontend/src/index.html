<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>RutAIGeoProxi</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  
  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              cyan:  'var(--brand-cyan, #00F2FF)',
              blue:  'var(--brand-blue, #0096FF)',
              dark:  'var(--bg-dark, #0A0E1A)',
              card:  'var(--bg-card, #111629)',
              border:'var(--border-color, #1F2744)',
            }
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['Orbitron', 'monospace'],
          },
          animation: {
            'float':      'float 6s ease-in-out infinite',
            'float-slow': 'float 9s ease-in-out infinite',
            'pulse-slow': 'pulse 4s ease-in-out infinite',
            'slide-up':   'slideUp 0.6s ease-out forwards',
            'glow':       'glow 3s ease-in-out infinite',
          },
          keyframes: {
            float:    { '0%,100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-18px)' } },
            slideUp:  { from: { opacity: 0, transform: 'translateY(30px)' }, to: { opacity: 1, transform: 'translateY(0)' } },
            glow:     { '0%,100%': { boxShadow: '0 0 20px rgba(0,242,255,0.3)' }, '50%': { boxShadow: '0 0 50px rgba(0,242,255,0.7)' } },
          }
        }
      }
    }
  </script>
  <script>
    // Prevenir el destello (FOUC) aplicando el tema antes de que Angular inicie.
    if (localStorage.getItem('theme') === 'light') {
      document.body.classList.add('light-theme');
    }
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
